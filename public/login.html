<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SkyNet – Login</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <nav class="nav">
      <a href="index.html" class="brand" style="text-decoration: none; color: inherit;">
        <span>🚁</span>
        <span>SkyNet</span>
      </a>
      <div class="links">
        <a data-nav href="index.html">Home</a>
        <a data-nav href="services.html">Services</a>
        <a data-nav href="order.html">Order</a>
        <a data-nav href="track.html">Track</a>
        <a data-nav href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <div class="card" style="max-width:560px; margin:0 auto;">
      <h2>Login</h2>
      <p class="hint">
        Log in to place orders.
      </p>

      <div class="stack">
        <div>
          <label for="username">Username</label>
          <input id="username" placeholder="e.g. ari" autocomplete="username" />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••" autocomplete="current-password" />
        </div>

        <div class="row" style="gap:10px; flex-wrap:wrap;">
          <button class="btn" id="loginBtn" type="button">Login</button>
          <a class="btn secondary" href="register.html">Create account</a>
        </div>

        <div class="hint" id="status">—</div>

        <div class="hint">
        </div>
      </div>
    </div>
  </main>

  <script src="js/common.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
