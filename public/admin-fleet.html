<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SkyNet – Admin Fleet</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <header>
    <nav class="nav">
      <a href="admin.html" class="brand" style="text-decoration: none; color: inherit;">
        <span>🚁</span>
        <span>SkyNet</span>
      </a>
      <div class="links">
        <a data-nav href="track.html">Track</a>
        <a data-nav href="orders.html">Orders</a>
        <a data-nav href="admin-fleet.html" aria-current="page">Fleet</a>
        <a data-nav href="admin-stats.html">Statistics</a>
        <a data-nav href="admin-contacts.html">Messages</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <div class="card" id="loginCard">
      <h2>Admin login</h2>
      <p class="muted">Default user: <b>admin</b> • Password = <code>ADMIN_KEY</code> (env variable).</p>
      <div class="stack">
        <label>Username</label>
        <input id="username" placeholder="admin" />
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••" />
        <button class="btn" id="loginBtn">Login</button>
        <p id="loginStatus" class="hint"></p>
      </div>
    </div>

    <div class="card" id="adminPanel" style="display:none;">
      <h2>Drone fleet</h2>
      <div class="hint">
        Drone must have enough battery for full trip (base → pickup → delivery → base).
      </div>


      <div class="card" style="padding:12px; margin-top:10px;">
        <div id="drones" class="stack"></div>
      </div>
    </div>

    <footer>SkyNet Admin • Fleet</footer>
  </main>

  <script src="js/common.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
